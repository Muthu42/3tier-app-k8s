name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-cicd.yml'

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-k8s:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend-k8s:${{ env.IMAGE_TAG }}

      - name: Update frontend image in manifest
        run: |
          sed -i "s|image: .*frontend-k8s:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-k8s:${IMAGE_TAG}|g" k8s/frontend-deployment.yml

      - name: Commit and push updated manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add k8s/frontend-deployment.yml

          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git commit -m "Update frontend image to ${IMAGE_TAG}"
          git pull origin main --rebase
          git push origin main
