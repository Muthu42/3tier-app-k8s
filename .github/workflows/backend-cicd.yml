name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-cicd.yml'

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-k8s:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/backend-k8s:${{ env.IMAGE_TAG }}

      - name: Update backend image in manifest
        run: |
          sed -i "s|image: .*backend-k8s:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend-k8s:${IMAGE_TAG}|g" k8s/backend-deployment.yml

      - name: Commit and push updated manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add k8s/backend-deployment.yml
          git commit -m "Update backend image to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
